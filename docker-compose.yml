# Local/VPS parity for Radar Stark. Supabase is external (cloud or a separate
# local stack) — point SUPABASE_DB_URL etc. at it via the .env file below.
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      WEB_DIST: /app/web
    # Secrets and connection strings (SUPABASE_DB_URL, SUPABASE_URL,
    # SUPABASE_SERVICE_KEY, SESSION_SECRET, WHATSAPP_OWNER, OPENAI_API_KEY,
    # PUBLIC_APP_URL, …). Copy .env.example → .env and fill it in.
    env_file:
      - .env
    restart: unless-stopped
